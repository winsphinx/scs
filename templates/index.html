<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能客户服务系统</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .container {
            display: flex;
            gap: 20px;
        }

        .complaints-section,
        .query-section {
            flex: 1;
            border: 1px solid #ddd;
            padding: 15px;
            border-radius: 5px;
            height: calc(100vh - 200px);
            overflow-y: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th,
        td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }

        th {
            background-color: #f2f2f2;
        }

        textarea,
        input {
            width: 100%;
            padding: 8px;
            margin: 5px 0;
        }

        button {
            padding: 8px 15px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        button:hover {
            background-color: #45a049;
        }

        #question {
            padding: 10px;
            resize: none;
            box-sizing: border-box;
        }

        #response {
            margin-top: 10px;
            padding: 10px;
            border: 1px solid #ddd;
            min-height: 100px;
            height: 66%;
            overflow-y: auto;
        }
    </style>
    <style>
        /* 详情模态框样式 */
        .modal {
            display: none;
            position: fixed;
            z-index: 1;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: rgba(0, 0, 0, 0.4);
        }

        .modal-content {
            background-color: #fefefe;
            margin: 15% auto;
            padding: 20px;
            border: 1px solid #888;
            width: 60%;
            border-radius: 5px;
        }

        .close {
            color: #aaa;
            float: right;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
        }

        .close:hover {
            color: black;
        }
    </style>
</head>

<body>
    <!-- 详情模态框 -->
    <div id="complaintModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2 id="modalTitle"></h2>
            <p><strong>类别:</strong> <span id="modalCategory"></span></p>
            <p><strong>日期:</strong> <span id="modalDate"></span></p>
            <p><strong>内容:</strong></p>
            <p id="modalContent"></p>
        </div>
    </div>

    <h1>智能客户服务系统</h1>
    <div class="container">
        <div class="complaints-section">
            <h2>投诉列表</h2>
            <table id="complaintsTable">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>标题</th>
                        <th>类别</th>
                        <th>日期</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
        <div class="query-section">
            <h2>智能查询</h2>
            <textarea id="question" rows="4" placeholder="输入您的问题..."></textarea>
            <div style="display: flex; gap: 10px;">
                <button onclick="submitQuery()" id="queryButton">
                    <span id="buttonQuery">提交查询</span>
                    <i id="spinner" class="fas fa-hourglass-half" style="display: none; margin-left: 5px;"></i>
                </button>
                <button onclick="resetContext()" id="resetButton">
                    <span id="buttonReset">重置查询</span>
                    <i id="spinner" class="fas fa-hourglass-half" style="display: none; margin-left: 5px;"></i>
                </button>
            </div>
            <div id="response"></div>
        </div>
    </div>

    <script>
        // 加载投诉数据
        async function loadComplaints() {
            try {
                const response = await fetch('/complaint/');
                const data = await response.json();
                const tableBody = document.querySelector('#complaintsTable tbody');
                tableBody.innerHTML = '';

                data.complaints.forEach(complaint => {
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td>${complaint.id}</td>
                        <td>${complaint.title}</td>
                        <td>${complaint.category}</td>
                        <td>${new Date(complaint.date).toLocaleString()}</td>
                    `;
                    // 添加双击事件监听器
                    row.addEventListener('dblclick', () => showComplaintDetails(complaint));
                    tableBody.appendChild(row);
                });
            } catch (error) {
                console.error('加载投诉数据失败:', error);
            }
        }

        // 提交查询
        async function submitQuery() {
            const question = document.getElementById('question').value;
            if (!question) return;

            // 显示加载状态
            const button = document.getElementById('queryButton');
            const spinner = document.getElementById('spinner');
            const buttonQuery = document.getElementById('buttonQuery');

            button.disabled = true;
            buttonQuery.textContent = '查询中...';
            spinner.style.display = 'inline-block';

            try {
                const response = await fetch('/query/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ question })
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const data = await response.json();
                // 显示litellm原始返回结果和SQL查询结果
                document.getElementById('response').innerHTML = `
                    <strong>自然语言查询:</strong><br>${question}<br><br>
                    <strong>生成的SQL查询:</strong><br>${data.response}<br><br>
                    <strong>查询结果:</strong><br>找到 ${data.complaints ? data.complaints.length : 0} 条记录
                `;

                // 如果有查询结果，更新投诉列表
                if (data.complaints && data.complaints.length > 0) {
                    const tableBody = document.querySelector('#complaintsTable tbody');
                    tableBody.innerHTML = '';

                    data.complaints.forEach(complaint => {
                        const row = document.createElement('tr');
                        row.innerHTML = `
                            <td>${complaint.id}</td>
                            <td>${complaint.title}</td>
                            <td>${complaint.category}</td>
                            <td>${complaint.date ? new Date(complaint.date).toLocaleString() : ''}</td>
                        `;
                        // 添加双击事件监听器
                        row.addEventListener('dblclick', () => showComplaintDetails(complaint));
                        tableBody.appendChild(row);
                    });
                }
            } catch (error) {
                console.error('查询失败:', error);
                document.getElementById('response').innerHTML = '查询失败: ' + error.message;
            } finally {
                // 恢复按钮状态
                button.disabled = false;
                buttonQuery.textContent = '提交查询';
                spinner.style.display = 'none';
            }
        }

        // 页面加载时获取数据
        window.onload = loadComplaints;

        // 获取模态框元素
        const modal = document.getElementById("complaintModal");
        const span = document.getElementsByClassName("close")[0];

        // 点击关闭按钮时关闭模态框
        span.onclick = function () {
            modal.style.display = "none";
        }

        // 点击模态框外部时关闭
        window.onclick = function (event) {
            if (event.target == modal) {
                modal.style.display = "none";
            }
        }

        // 显示投诉详情
        function showComplaintDetails(complaint) {
            document.getElementById("modalTitle").textContent = complaint.title;
            document.getElementById("modalCategory").textContent = complaint.category;
            document.getElementById("modalDate").textContent = new Date(complaint.date).toLocaleString();
            document.getElementById("modalContent").textContent = complaint.content;
            modal.style.display = "block";
        }

        // 重置上下文
        async function resetContext() {
            try {
                const response = await fetch('/reset/', {
                    method: 'POST'
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                document.getElementById('response').innerHTML = '上下文已重置，可以开始新的对话。';
                document.getElementById('question').value = '';
            } catch (error) {
                console.error('重置上下文失败:', error);
                document.getElementById('response').innerHTML = '重置上下文失败: ' + error.message;
            }
        }

        // 回车键提交功能
        document.getElementById('question').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                e.preventDefault(); // 防止默认换行行为
                submitQuery();
            }
        });
    </script>
</body>

</html>
